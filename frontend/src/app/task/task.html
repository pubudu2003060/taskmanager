<main class="container py-4">
  <div class="row mb-4 align-items-center">
    <div class="col">
      <h2 class="mb-1">All Tasks</h2>
      <p class="text-muted mb-0">{{ tasks().length }} total tasks</p>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary" routerLink="/newtask">
        <i class="bi bi-plus-circle"></i> New Task
      </button>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-6 mb-3 mb-md-0">
      <form>
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            name="searchterm"
            [(ngModel)]="searchTerm"
            placeholder="Search for a task..."
          />
        </div>
      </form>
    </div>
    <div class="col-md-6">
      <div class="btn-group w-100" role="group">
        <button
          type="button"
          class="btn btn-outline-secondary"
          [class.active]="selectedStatusFilter === 'ALL'"
          (click)="setStatusFilter('ALL')"
        >All</button>
        <button
          type="button"
          class="btn btn-outline-danger"
          [class.active]="selectedStatusFilter === 'TO_DO'"
          (click)="setStatusFilter('TO_DO')"
        >Todo</button>
        <button
          type="button"
          class="btn btn-outline-warning"
          [class.active]="selectedStatusFilter === 'IN_PROGRESS'"
          (click)="setStatusFilter('IN_PROGRESS')"
        >In Progress</button>
        <button
          type="button"
          class="btn btn-outline-success"
          [class.active]="selectedStatusFilter === 'DONE'"
          (click)="setStatusFilter('DONE')"
        >Completed</button>
      </div>
    </div>
  </div>

  <div>
    @if (!isTaskLoaded()) {
      <div class="d-flex justify-content-center my-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
    }

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
      @for (item of tasks() | filterTodos: searchTerm : selectedStatusFilter; track item.id) {
        <div class="col">
          <app-todo-card [todoItem]="item" (taskDeleted)="onTaskDeleted($event)"></app-todo-card>
        </div>
      }
    </div>
  </div>
</main>
