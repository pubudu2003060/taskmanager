<div appAppHighlightCompletedTodo [isCompleted]="todoItem().completed" class="card">
  <a [routerLink]="['/taskdetails', todoItem().id]">
    {{ todoItem().title | uppercase }}
  </a>
  <input
    id="todo--{{ todoItem().id }}"
    type="checkbox"
    [checked]="todoItem().completed"
    (change)="this.todoClicked()"
  />
</div>
