<div class="card h-100 shadow-sm border-0" appAppHighlightCompletedTodo [status]="todoItem().status">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title fw-bold">
      <a [routerLink]="['/taskdetails', todoItem().id]" class="text-decoration-none text-dark">
        {{ todoItem().title | uppercase }}
      </a>
    </h5>
    
    <p class="card-text text-muted flex-grow-1">
      {{ todoItem().description | descriptionSlicePipe: 50 }}
    </p>
    
    <div class="d-flex justify-content-between align-items-center mt-3">
      <span class="badge" 
            [class.bg-warning]="todoItem().status === 'IN_PROGRESS'"
            [class.bg-success]="todoItem().status === 'DONE'"
            [class.bg-danger]="todoItem().status === 'TO_DO'">
        {{ todoItem().status.replace('_', ' ') }}
      </span>
      <button class="btn btn-outline-danger btn-sm" (click)="onDeleteClick()">
        Delete
      </button>
    </div>
  </div>
</div>
