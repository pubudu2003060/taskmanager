<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
          <h2 class="mb-0">{{ isEditMode() ? 'Edit Task' : 'Create New Task' }}</h2>
          @if (isEditMode()) {
            <a [routerLink]="['/taskdetails', taskId]" class="btn btn-outline-secondary btn-sm">Back</a>
          } @else {
            <a routerLink="/" class="btn btn-outline-secondary btn-sm">Back</a>
          }
        </div>
        
        <div class="card-body p-4">
          <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label for="title" class="form-label fw-bold">Title <span class="text-danger">*</span></label>
              <input 
                id="title" 
                type="text" 
                class="form-control" 
                [class.is-invalid]="submitAttempted() && taskForm.controls.title.invalid"
                formControlName="title" 
                placeholder="Enter task title..." 
              />
              @if (submitAttempted() && taskForm.controls.title.invalid) {
                <div class="invalid-feedback">A task title is required.</div>
              }
            </div>

            <div class="mb-3">
              <label for="description" class="form-label fw-bold">Description</label>
              <textarea
                id="description"
                class="form-control"
                formControlName="description"
                rows="4"
                placeholder="What needs to be done?"
              ></textarea>
            </div>

            <div class="mb-4">
              <label for="status" class="form-label fw-bold">Status</label>
              <select id="status" class="form-select" formControlName="status">
                @for (status of statusOptions; track status) {
                  <option [value]="status">{{ status.replace('_', ' ') }}</option>
                }
              </select>
            </div>

            @if (submitAttempted() && taskForm.invalid) {
              <div class="alert alert-danger mb-4" role="alert">
                Please fix the errors above before saving.
              </div>
            }

            <div class="d-flex justify-content-end gap-2 mt-4">
              <button type="button" class="btn btn-outline-secondary" (click)="onCancel()">Clear</button>
              <button type="submit" class="btn btn-primary px-4">
                {{ isEditMode() ? 'Update Task' : 'Save Task' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>
