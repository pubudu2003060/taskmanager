<main class="new-task-page">
  <section class="new-task-card">
    <div>
      <h1>{{ isEditMode() ? 'Edit Task' : 'Create New Task' }}</h1>

      @if (isEditMode()) {
        <button [routerLink]="`/taskdetails/${taskId}`">Back to Task</button>
      } @else {
        <button routerLink="">Back to Tasks</button>
      }
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" class="task-form">
      <div class="form-field">
        <label for="title">Title <span>*</span></label>
        <input id="title" type="text" formControlName="title" placeholder="Enter task title..." />
        @if (taskForm.controls.title.touched && taskForm.controls.title.invalid) {
          <p class="field-error">Title is required.</p>
        }
      </div>

      <div class="form-field">
        <label for="description">Description</label>
        <textarea
          id="description"
          formControlName="description"
          rows="5"
          placeholder="What needs to be done?"
        ></textarea>
      </div>

      <div class="form-field">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
          @for (status of statusOptions; track status) {
            <option [value]="status">{{ status }}</option>
          }
        </select>
      </div>

      @if (submitAttempted() && taskForm.invalid) {
        <div class="form-alert">Please fix the errors above before submitting.</div>
      }

      <div class="form-actions">
        <button type="button" class="secondary-button" (click)="onCancel()">Cancel</button>
        <button type="submit" class="primary-button">
          {{ isEditMode() ? 'Update Task' : 'Save Task' }}
        </button>
      </div>
    </form>
  </section>
</main>
